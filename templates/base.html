<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Finn</title>
    
    <!-- Importação do Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800 font-sans antialiased pb-24">
    <!-- Cabeçalho superior -->
    <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-gray-900">My Finn</h1>


        <!-- Avatar do usuário -->
        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold text-lg">
        C
        </div>



    </header>



    <main class="p-4">
        {% block content %}
        {% endblock %}
    </main>
    <!-- Menu inferior fixo -->
     <nav class="bg-white border-t border-gray-200 fixed bottom-0 w-full z-50 pb-safe">
        <div class="flex justify-around items-center h-16">
            <!-- Item 1: Visão Geral-->
            <a href="{{ url_for('inicio') }}" class="flex flex-col items-center text-gray-400 hover:text-blue-500 transition-colors">
                 <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                 </path>
                </svg>
            </a>
            
            <!--Item 2: Cartões (Exemplo de item Ativo)-->
            <a href="{{ url_for('cartoes') }}" class="flex flex-col items-center text-blue-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
            </a>

            <!-- Item 3: Ajustes/Mais -->
            <a href="{{ url_for('perfil') }}" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                <span class="text-xs mt-1">Menu</span>
            </a>
        </div>
    </nav>


</body>
</html>
