{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col gap-6">
    
    <header class="mt-2">
        <h2 class="text-2xl font-bold text-gray-900">Meus Cartões</h2>
    </header>

    <section class="flex flex-col gap-4">
        {% for cartao in meus_cartoes %}

        <div class="{{ cartao.cor }} rounded-3xl p-6 text-white shadow-sm relative overflow-hidden">
            <div class="flex justify-between items-center mb-8">
                <span class="font-bold text-lg tracking-wide">{{ cartao.nome }}</span>
                <span class="text-xs font-medium px-2 py-1 bg-white/20 rounded">{{ cartao.bandeira }}</span>
            </div>
            <div>
                <p class="text-xs opacity-90 mb-1 font-medium tracking-widest">FINAL DO CARTÃO</p>
                <p class="text-xl font-mono tracking-[0.2em]">**** **** **** {{ cartao.final }}</p>
            </div>
        </div>

        {% endfor %}
    </section>

</div>
{% endblock %}
