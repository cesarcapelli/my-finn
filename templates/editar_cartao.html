{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col gap-6">
    
    <header class="mt-2">
        <h2 class="text-2xl font-bold text-gray-900">Editar Cartão</h2>
        <p class="text-sm text-gray-500">Altere os dados abaixo para atualizar o seu cartão.</p>
    </header>

    <section class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100">
        <form action="/editar_cartao/{{ cartao_tela.id }}" method="POST" class="flex flex-col gap-4">

            <div>
                <label class="text-xs font-medium text-gray-500 mb-1 block">Nome da Instituição</label>
                <input type="text" name="nome_cartao" value="{{ cartao_tela.nome }}" required
                        class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 text-sm text-gray-800 outline-none focus:border-blue-500 transition-colors">
            </div>

            <div>
                <label class="text-xs font-medium text-gray-500 mb-1 block">Últimos 4 dígitos</label>
                <input type="text" name="final_cartao" value="{{ cartao_tela.final }}" maxlength="4" required
                        class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2 text-sm text-gray-800 outline-none focus:border-blue-500 transition-colors">
            </div>

            <div class="flex gap-3 mt-2">
                <button type="submit" class="flex-1 bg-blue-600 text-white font-medium rounded-xl py-3 hover:bg-blue-700 transition-colors">
                    Salvar Alterações
                </button>
                <a href="/cartoes" class="flex-1 bg-gray-100 text-gray-600 text-center font-medium rounded-xl py-3 hover:bg-gray-200 transition-colors">
                    Cancelar
                </a>
            </div>

        </form>
    </section>

</div>
{% endblock %}
